<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qual vai ser o Treino?</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body>
  <section>
    <img src="gymrats.png" alt="">
    <h1>Qual vai ser o treino?</h1>
    <section id="menu">
      <form action="">
        <div class="flex-column place-start gap-2 width-15">
          <div class="flex align-items-center space-between">
            <label for="membros" class="font-bold">Membros</label>
            <input type="number" id="membros" value="7" min="2" max="100" class="input">
          </div>
          <div class="flex align-items-center space-between">
            <label for="refeicao" class="font-bold">Refeição R$</label>
            <input type="number" id="refeicao" value="1.00" min="1" max="1000" step="0.01" class="input">
          </div>
          <div class="flex place-center">
            <button class="button">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-ladder"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M8 3v18" /><path d="M16 3v18" /><path d="M8 14h8" /><path d="M8 10h8" /><path d="M8 6h8" /><path d="M8 18h8" /></svg>
            </button>
          </div>
        </div>
      </form>
    </section>

    <div class="esconder">
      <section id="escadinha">
        <table>
          <thead>
            <tr>
              <th>Posição</th>
              <th>R$</th>
            </tr>
          </thead>
          <tbody></tbody>
          <tfoot>
            <tr>
              <td>Total</td>
              <td class="total">0</td>
            </tr>
          </tfoot>
        </table>
      </section>
    </div>
  </section>
</body>

</html>
